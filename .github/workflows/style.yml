# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Style checking

on:
  pull_request: ~
  push:
    branches:
      - main

jobs:
  prettier:
    runs-on: ubuntu-24.04
    name: prettier
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          # https://github.com/pnpm/action-setup?tab=readme-ov-file#use-cache-to-reduce-installation-time
          run_install: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm prettier

  stylua:
    name: stylua
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: JohnnyMorganz/stylua-action@76fd70c03e6340ceaf673366712db9b20560b402 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # renovate: datasource=github-releases depName=JohnnyMorganz/StyLua
          version: v2.4.1
          # CLI arguments
          args: --color always --check --allow-hidden .
