---
name: Run tests
on:
  pull_request: ~
  push:
    branches:
      - main

permissions:
  contents: read

env:
  # renovate: datasource=git-refs-master packageName=https://github.com/neovim/neovim
  NEOVIM_NIGHTLY_COMMIT: 7945732ed7bb211f91112292a13b51fc3182599b

jobs:
  # Build the pinned Neovim nightly once (cached by commit) and publish it as an
  # artifact, instead of rebuilding it in every matrix job on a cache miss.
  build-neovim-nightly:
    name: Build pinned Neovim nightly
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build pinned Neovim nightly
        uses: mikavilpas/neovim-action/build-nightly@673c9715ab356c92820355ad99d7c23ca564da0c # v3.2.0
        with:
          commit: ${{ env.NEOVIM_NIGHTLY_COMMIT }}

  build:
    name:
      "Test (neovim ${{ matrix.neovim.name }}, yazi ${{ matrix.yazi-version.name
      }})"
    runs-on: ubuntu-24.04
    needs: build-neovim-nightly
    permissions:
      contents: read
    strategy:
      matrix:
        neovim:
          - name: nightly
          - name: stable
        yazi-version:
          - name: nightly
            method: cargo-install
            # renovate: datasource=git-refs packageName=https://github.com/sxyazi/yazi
            commit: 21550a7eb5086ba34f8eabf8aaab85f601d34a74
          - name: stable
            method: download
            # renovate: datasource=github-releases depName=sxyazi/yazi
            version: v26.5.6
          - name: v26.1.22
            method: download
            version: v26.1.22
          - name: v26.1.4
            method: download
            version: v26.1.4

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        if: matrix.yazi-version.method == 'cargo-install'
        with:
          toolchain: stable

      - name: Install tools with UBI
        shell: bash
        run: |
          mkdir -p "$HOME/.local/bin"
          # make the tools available for subsequent steps
          echo "$(pwd)/bin" >> "$GITHUB_PATH"
          curl --silent --location \
              https://raw.githubusercontent.com/houseabsolute/ubi/master/bootstrap/bootstrap-ubi.sh |
              TARGET="$HOME/.local/bin" sh

          VERSION=$(yq '.tools."github:EmmyLuaLs/emmylua-analyzer-rust"' mise.toml)
          ubi --project EmmyLuaLs/emmylua-analyzer-rust --tag "$VERSION" --exe emmylua_ls --matching-regex "^emmylua_ls"

          VERSION=$(yq '.tools.ripgrep.version' mise.toml)
          ubi --project BurntSushi/ripgrep --tag "$VERSION" --exe rg

          VERSION=$(yq '.tools.fzf' mise.toml)
          ubi --project junegunn/fzf --tag "v$VERSION"

          VERSION=$(yq '.tools.fd' mise.toml)
          ubi --project sharkdp/fd --tag "v$VERSION"
          ls -alR bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install the mold linker
        if: matrix.yazi-version.method == 'cargo-install'
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      - name: Compile and install `yazi-fm` from source
        if: matrix.yazi-version.method == 'cargo-install'
        uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3.4.0
        with:
          # Due to Cargo's limitations, the `yazi-fm` and `yazi-cli` crates on
          # crates.io must be built with `cargo install --force yazi-build`
          # https://github.com/sxyazi/yazi/blob/2ec3a6c645324295331c0f2ef6d4d946cf11c06b/yazi-fm/build.rs?plain=1#L23-L25
          crate: yazi-build
          git: https://github.com/sxyazi/yazi
          commit: ${{ matrix.yazi-version.commit }}
          # tag: ${{ matrix.yazi-version.tag }}

      - name: Download prebuilt yazi version
        if: matrix.yazi-version.method == 'download'
        run: |
          ubi --project sxyazi/yazi --tag "${{ matrix.yazi-version.version }}" --extract-all
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Make sure yazi and ya are installed
        run: |
          echo "PATH:"
          echo "$PATH"

          yazi --version
          ya --version

      - name: Download pinned Neovim nightly
        id: neovim-nightly
        if: matrix.neovim.name == 'nightly'
        uses: mikavilpas/neovim-action/restore-nightly@673c9715ab356c92820355ad99d7c23ca564da0c # v3.2.0
        with:
          commit: ${{ env.NEOVIM_NIGHTLY_COMMIT }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          # https://github.com/pnpm/action-setup?tab=readme-ov-file#use-cache-to-reduce-installation-time
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install

      - name: Run tests
        uses: nvim-neorocks/nvim-busted-action@bbcfe82d35b8fb4660ef6ed4124e1fd9cef4688b # v1.2.0
        with:
          # This action MUST install a neovim by design. For nightly neovim we
          # want to use our own pinned build, so the action only needs to
          # install a real Neovim for the `stable` case.
          nvim_version:
            ${{ matrix.neovim.name == 'nightly' && 'stable' ||
            matrix.neovim.name }}
          luarocks_version: "3.11.1"
          before: |
            # The pinned action runs `rhysd/action-setup-vim` before this
            # `before` hook, and the `luarocks test` run after it. Prepending our
            # pinned nightly to PATH here therefore makes nlua/busted use it
            # instead of the Neovim the action just installed.
            if [ "${{ matrix.neovim.name }}" = "nightly" ]; then
              prefix="${{ steps.neovim-nightly.outputs.prefix }}/bin"
              # `>> "$GITHUB_PATH"` only affects *subsequent* steps
              export PATH="$prefix:$PATH"
              echo "$prefix" >> "$GITHUB_PATH"
              short="${{ steps.neovim-nightly.outputs.short-commit }}"
              echo "nvim resolves to: $(command -v nvim)"
              nvim --version
              nvim --version | grep --quiet "$short" || {
                echo "Extracted Neovim does not report the expected commit $NEOVIM_NIGHTLY_COMMIT (looked for $short)"
                exit 1
              }
            fi
            # copied from mise.toml
            luarocks init --no-gitignore
            luarocks install busted 2.2.0-1
            luarocks install nlua 0.3.2-1

      - name: Verify that dependencies are available
        run: |
          # ripgrep is a dependency of telescope and fzf-lua
          #
          # fd is a dependency of telescope and fzf-lua
          # https://github.com/sharkdp/fd?tab=readme-ov-file#on-ubuntu
          # make sure it's available as `fd` - there seems to be some conflict in Ubuntu
          #
          # realpath is used to resolve relative paths in yazi.nvim
          fd --version
          fzf --version
          rg --version
          which realpath || { exit 1; }

      - working-directory: integration-tests
        name: Prepare Neovim for integration tests
        run: |
          # NVIM_APPNAME=nvim is the default, but spelled out here for clarity
          NVIM_APPNAME=nvim pnpm tui neovim prepare
          NVIM_APPNAME=nvim_integrations pnpm tui neovim prepare

      # need to work around https://github.com/cypress-io/github-action/issues/1246
      - run: pnpm --filter integration-tests exec cypress install

      - name: Cypress test
        uses: cypress-io/github-action@948d67d3074f1bbb6379c8bdbb04e95d2f8e593f # v7.4.0
        with:
          install: false
          command: pnpm tui run

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        # add the line below to store screenshots only on failures
        # if: failure()
        if: failure()
        with:
          name: cypress-screenshots
          path: integration-tests/cypress/screenshots
          if-no-files-found: ignore # 'warn' or 'error' are also available, defaults to `warn`

